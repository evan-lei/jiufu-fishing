<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九洑环湖路亚基地</title>
<meta name="description" content="九洑环湖路亚基地 — 钓场介绍与路亚行业观察">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cyan: #00c4d4;
  --gold: #c9a84c;
  --gold-lt: #e8c870;
  --dark: #080e12;
  --dark2: #0d1821;
  --dark3: #152030;
  --teal: #0a2535;
  --teal-lt: #1a4a65;
  --white: #f0f4f8;
  --dim: #7a9ab0;
}

html, body { height: 100%; font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; }

/* ===== BG ===== */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,150,180,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(201,168,76,.08) 0%, transparent 55%),
    var(--dark);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(0,196,212,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,196,212,.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
}

/* ===== LAYOUT ===== */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 5vw;
}

/* ===== HEADER ===== */
.header { text-align: center; margin-bottom: 64px; }
.logo-wrap {
  width: 90px; height: 90px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px;
  border: 2px solid rgba(201,168,76,.35);
  box-shadow: 0 0 40px rgba(0,196,212,.18);
}
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
.site-title {
  font-size: clamp(26px,5vw,44px); font-weight: 900; letter-spacing: 4px;
  font-family: 'Noto Serif SC', 'Source Han Serif CN', serif;
  background: linear-gradient(135deg, var(--white) 30%, var(--gold-lt));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 10px;
}
.site-slogan {
  font-size: clamp(13px,2vw,16px); color: var(--dim); letter-spacing: 4px;
  font-family: 'Noto Serif SC', serif;
}

/* ===== CARDS ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  width: 100%; max-width: 900px;
}

.entry-card {
  position: relative; overflow: hidden;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  transition: transform .35s ease, border-color .35s ease, box-shadow .35s ease;
  cursor: pointer;
}
.entry-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 24px 60px rgba(0,0,0,.4);
}
.entry-card.cyan:hover { border-color: rgba(0,196,212,.5); box-shadow: 0 24px 60px rgba(0,196,212,.15); }
.entry-card.gold:hover { border-color: rgba(201,168,76,.5); box-shadow: 0 24px 60px rgba(201,168,76,.15); }

/* card image area */
.card-img {
  width: 100%; aspect-ratio: 16/9; overflow: hidden;
  position: relative;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; }
.entry-card:hover .card-img img { transform: scale(1.06); }
.card-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(8,14,18,.85));
}
.card-img-icon {
  position: absolute; bottom: 16px; left: 20px;
  font-size: 36px;
}

/* card body */
.card-body { padding: 24px 28px 28px; flex: 1; display: flex; flex-direction: column; }
.card-tag {
  font-size: 11px; letter-spacing: 3px; margin-bottom: 10px;
  display: inline-block; padding: 3px 12px; border-radius: 10px;
  width: fit-content;
}
.card-tag.cyan { color: var(--cyan); background: rgba(0,196,212,.1); border: 1px solid rgba(0,196,212,.25); }
.card-tag.gold { color: var(--gold-lt); background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.25); }
.card-title {
  font-size: clamp(20px,2.8vw,28px); font-weight: 900; letter-spacing: 2px;
  font-family: 'Noto Serif SC', serif; margin-bottom: 10px;
}
.card-desc { font-size: clamp(13px,1.4vw,15px); color: var(--dim); line-height: 1.8; flex: 1; }
.card-cta {
  margin-top: 24px; display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 600; letter-spacing: 1px;
  transition: gap .2s;
}
.entry-card:hover .card-cta { gap: 14px; }
.card-cta.cyan { color: var(--cyan); }
.card-cta.gold { color: var(--gold-lt); }
.card-cta svg { width: 18px; height: 18px; transition: transform .2s; }
.entry-card:hover .card-cta svg { transform: translateX(4px); }

/* ===== FOOTER ===== */
.footer { margin-top: 60px; text-align: center; }
.footer-text { font-size: 12px; color: rgba(122,154,176,.5); letter-spacing: 2px; }

/* ===== MOBILE ===== */
@media (max-width: 640px) {
  .cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .header { margin-bottom: 28px; }
  .logo-wrap { width: 64px; height: 64px; margin-bottom: 12px; }
  .site-title { font-size: 20px; letter-spacing: 2px; }
  .site-slogan { font-size: 11px; letter-spacing: 2px; }
  .card-img { aspect-ratio: 4/3; }
  .card-img-icon { font-size: 24px; bottom: 10px; left: 12px; }
  .card-body { padding: 12px 12px 16px; }
  .card-tag { font-size: 9px; letter-spacing: 1px; padding: 2px 8px; margin-bottom: 6px; }
  .card-title { font-size: 15px; letter-spacing: 1px; margin-bottom: 6px; }
  .card-desc { font-size: 11px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-cta { font-size: 12px; margin-top: 12px; }
  .card-cta svg { width: 14px; height: 14px; }
  .page { padding: 40px 4vw; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="page">

  <div class="header">
    <div class="logo-wrap">
      <img src="https://jiufu-1256297898.cos.ap-beijing.myqcloud.com/logo.webp" alt="九洑环湖路亚基地">
    </div>
    <div class="site-title">九洑环湖路亚基地</div>

  <div class="cards">

    <!-- Card 1: 钓场主页 -->
    <a href="./club/" class="entry-card cyan">
      <div class="card-img">
        <img src="https://jiufu-1256297898.cos.ap-beijing.myqcloud.com/钓场环境/IMG_1722.JPG" alt="九洑钓场">
        <div class="card-img-overlay"></div>

      <div class="card-body">

        <div class="card-desc">开业投放 5000 斤优质底鱼，大湖区 + 雷强区双钓场，配套咖啡厅、露营区与亲子乐园。</div>
        <div class="card-cta cyan">
          进入钓场主页
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </a>

    <!-- Card 2: 路亚发展 -->
    <a href="./industry/" class="entry-card gold">
      <div class="card-img">
        <img src="https://jiufu-1256297898.cos.ap-beijing.myqcloud.com/5.jpg" alt="路亚行业">
        <div class="card-img-overlay"></div>
        <div class="card-img-icon">📊</div>
      </div>
      <div class="card-body">
        <div class="card-tag gold">INDUSTRY INSIGHT</div>
        <div class="card-title">路亚行业发展现状</div>
        <div class="card-desc">从黑坑到欢乐塘，路亚行业正在洗牌。拆解双赢模型，探索可持续发展的新路径。</div>
        <div class="card-cta gold">
          查看行业洞察
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </a>

  </div>

  <div class="footer">
    <div class="footer-text">九洑环湖路亚基地 &nbsp;·&nbsp; 百度 / 高德搜索「九洑环湖路亚」</div>
  </div>

</div>

</body>
</html>
